# ─────────────────────────────────────────────────────────────────────────────
# VBM App — Docker Compose
#
# Uso:
#   docker compose up --build         # primera vez
#   docker compose up                 # siguientes veces
#   docker compose down               # bajar
#
# Pipeline actual: deepmriprep (PyTorch puro) + CNN MedicalNet ResNet-18.
# (SPM12 + MCR R2024b descartados en migración por irreproducibilidad
#  cross-platform — ver Dockerfile y app/pipelines/deepmriprep_pipeline.py)
#
# Assets pesados (NO están en git — montados desde el host):
#   backend/models/  → deepmriprep_cnn_fold3.pt  (~130 MB, modelo CNN)
# ─────────────────────────────────────────────────────────────────────────────

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vbm_backend
    ports:
      - "8000:8000"
    volumes:
      # Modelo CNN montado desde el host (no se mete en la imagen)
      - ./backend/models:/app/models:ro
      # Temporal de procesamiento (lectura/escritura)
      - ./backend/tmp:/app/tmp
    environment:
      - ROBEX_DIR=/opt/ROBEX
      # ── Flags de diagnóstico ─────────────────────────────────────────────
      # KEEP_TMP_FILES=true → no borra /app/tmp/<job_id>/ al terminar
      #                       (útil para inspeccionar mwp1*.nii.gz intermedios)
      - KEEP_TMP_FILES=true
    # Sin GPU: comentar o eliminar el bloque deploy
    # Con GPU NVIDIA: descomentar (requiere nvidia-container-toolkit en el host)
    # deepmriprep auto-detecta GPU vía torch.cuda.is_available()
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vbm_frontend
    ports:
      - "3000:80"       # Nginx sirve el build de React en el puerto 80 interno
    depends_on:
      - backend
    restart: unless-stopped
