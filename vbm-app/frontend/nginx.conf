server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: cualquier ruta desconocida sirve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy a la API del backend (servicio "backend" del docker-compose)
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Las predicciones pueden tardar varios minutos
    proxy_connect_timeout 30s;
    proxy_send_timeout    900s;
    proxy_read_timeout    900s;

    # Subida de archivos T1: hasta 500 MB (coincide con API_CONFIG.max_upload_mb)
    client_max_body_size 500M;
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;
}
